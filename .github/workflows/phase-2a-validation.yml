name: Phase 2A PR Validation

on:
  push:
    branches:
      - phase-2a-final-validation
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Show PHP environment
        run: |
          php -v
          php -m

      - name: PHP syntax check
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' \
            -not -path './.git/*' \
            -not -path './portal-data/*' \
            -not -path './portal-uploads/*' \
            -print0)

      - name: Phase 2A static security checks
        shell: pwsh
        run: ./tests/phase-2a-security-static-tests.ps1

      - name: Phase 2A functional security checks
        run: php tests/phase-2a-functional-security-tests.php
